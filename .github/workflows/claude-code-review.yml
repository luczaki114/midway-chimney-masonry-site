name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: 'Bash(gh pr *),Bash(gh api *),Read,Glob,Grep'
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in the repository ${{ github.repository }}.

            Steps:
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see what changed.
            2. Run `gh pr view ${{ github.event.pull_request.number }}` to read the PR description.
            3. Read any changed files in full if the diff alone is insufficient to judge correctness.
            4. Evaluate the changes for: correctness, Next.js best practices (App Router, RSC boundaries, next/image, next/link, metadata), code quality, and security.
            5. Post your verdict:
               - If the changes look good: `gh pr review ${{ github.event.pull_request.number }} --approve --body "Your approval message here"`
               - If there are issues that must be fixed: `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Your feedback here"`
               - If it is a trivial/test PR with no real code: approve it with a note.

            Be concise in your review body. Focus on what matters — bugs, anti-patterns, missing things — not style nits.
